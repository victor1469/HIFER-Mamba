# GENERATE TIME: Wed Dec 31 02:40:45 2025
# CMD:
# basicsr/train.py -opt options/train/mambairpro/train_MambaFrez23_SR_x2.yml

# general settings for image SR training
name: MambaFrez23_SR_x2
model_type: MambaFrez23Model
scale: 2
num_gpu: 2
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt:
      - /home/kai/mamba/MambaIR/datasets/DF2K/HR

    dataroot_lq:
      - /home/kai/mamba/MambaIR/datasets/DF2K/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 32
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /home/kai/mamba/MambaIR/datasets/SR/Set14/HR
    dataroot_lq: /home/kai/mamba/MambaIR/datasets/SR/Set14/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk



network_g:
  type: MambaFrez23
  upscale: 2
  in_chans: 3
  img_size: 64
  img_range: 1.
  embed_dim: 174
  d_state: 16
  depths: [6, 6, 6,6,6,6]
  num_heads: [6,6,6,6,6,6]
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2.
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'


# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    #lr: !!float 2e-4
    lr: !!float 1e-4
    weight_decay: 1e-4
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingLR
    T_max: 500000
    eta_min: 1e-6


  total_iter: 500000
  warmup_iter: 5000 
  warmup_type: linear

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true



# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
